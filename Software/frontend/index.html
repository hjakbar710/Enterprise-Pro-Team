<!DOCTYPE html>
<html>

<head>

<title>Bradford Business Asset Map</title>

<meta charset="utf-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

#header{
background:#2c3e50;
color:white;
padding:15px;
}

#controls{
padding:10px;
background:#f4f4f4;
border-bottom:1px solid #ccc;
}

#container{
display:flex;
height:calc(100vh - 120px);
}

#assetList{
width:30%;
overflow-y:auto;
border-right:1px solid #ccc;
padding:10px;
background:#fafafa;
}

#map{
width:70%;
height:100%;
}

.assetItem{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
}

.assetItem:hover{
background:#eee;
}

input{
width:100%;
margin-bottom:5px;
}

button{
padding:5px;
margin-top:5px;
}

</style>

</head>

<body>

<div id="header">
<h2>Bradford Business Asset Map</h2>
</div>

<div id="controls">

<label>Filter by Category:</label>

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="Retail">Retail</option>
<option value="Office">Office</option>
<option value="Industrial">Industrial</option>
<option value="Vacant">Vacant</option>
</select>

</div>

<div id="container">

<div id="assetList">

<h3>Assets</h3>

<div id="assetItems"></div>

</div>

<div id="map"></div>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>


<script>

const map = L.map("map").setView([53.796, -1.759], 11)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ maxZoom:19 }
).addTo(map)


const markers = L.markerClusterGroup()

const assetList = document.getElementById("assetItems")

const categoryFilter = document.getElementById("categoryFilter")


function loadAssets(){

markers.clearLayers()
assetList.innerHTML = ""

fetch("http://localhost:3000/assets")

.then(res => res.json())

.then(data => {

const selectedCategory = categoryFilter.value

data.forEach(asset => {

if(asset.latitude && asset.longitude){

if(selectedCategory !== "all" && asset.category !== selectedCategory){
return
}

const name = asset.ratepayer || "Unnamed Property"

const marker = L.marker([asset.latitude, asset.longitude])

.bindPopup(

"<b>" + name + "</b><br>" +
"Category: " + (asset.category || "None") + "<br>" +
"Address: " + asset.address + "<br>" +
"Postcode: " + asset.postcode + "<br>" +
"Rateable Value: £" + asset.rateable_value + "<br>" +
"Jobs Logged: " + asset.job_count

)

markers.addLayer(marker)


const item = document.createElement("div")

item.className = "assetItem"

item.innerHTML =
"<b>" + name + "</b><br>" +
asset.postcode


item.onclick = function(){

map.setView([asset.latitude, asset.longitude],15)
marker.openPopup()

}

assetList.appendChild(item)

}

})

})

map.addLayer(markers)

}


categoryFilter.addEventListener("change", loadAssets)

loadAssets()


/* -----------------------------
   MAP CLICK → ADD NEW ASSET
   ----------------------------- */

map.on("click", function(e){

const lat = e.latlng.lat
const lng = e.latlng.lng

const form = `

<b>Add New Asset</b><br><br>

Name:<br>
<input id="newName"><br>

Address:<br>
<input id="newAddress"><br>

Postcode:<br>
<input id="newPostcode"><br>

Rateable Value:<br>
<input id="newValue"><br>

<button onclick="saveAsset(${lat},${lng})">
Save Asset
</button>

`

L.popup()
.setLatLng(e.latlng)
.setContent(form)
.openOn(map)

})


function saveAsset(lat,lng){

const ratepayer = document.getElementById("newName").value
const address = document.getElementById("newAddress").value
const postcode = document.getElementById("newPostcode").value
const rateable_value = document.getElementById("newValue").value

fetch("http://localhost:3000/assets",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
ratepayer,
address,
postcode,
latitude:lat,
longitude:lng,
rateable_value
})

})

.then(res=>res.json())
.then(data=>{

alert("Asset added successfully")

loadAssets()

})

}

</script>

</body>

</html>
